<svg xmlns="http://www.w3.org/2000/svg" width="40" height="50" viewBox="0 0 40 50" fill="none" role="img" aria-labelledby="terminal-title terminal-desc">
  <title id="terminal-title">Animated terminal icon</title>
  <desc id="terminal-desc">A terminal prompt icon with a looping cursor line.</desc>
  <g transform="translate(6 11) scale(1.15)" stroke="#2C365D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="4 17 10 11 4 5"/>
    <line x1="12" y1="19" x2="20" y2="19">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
