  <text id="tiny5-profile-tagline-mobile-line-1" aria-label="Here to learn from the GitHub community" data-font="Tiny5" data-renderer="svg-text" x="23" y="14" fill="#2C365D" font-family="Tiny5ProfileTagline, monospace" font-size="16" font-weight="400" dominant-baseline="middle" text-anchor="start">Here to learn from the GitHub community</text>
  <text id="tiny5-profile-tagline-mobile-line-2" aria-label="and contribute where I can." data-font="Tiny5" data-renderer="svg-text" x="23" y="42" fill="#2C365D" font-family="Tiny5ProfileTagline, monospace" font-size="16" font-weight="400" dominant-baseline="middle" text-anchor="start">and contribute where I can.</text>
