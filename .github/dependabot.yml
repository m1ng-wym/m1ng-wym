version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    assignees:
      - "m1ng-wym"
    labels:
      - "dependencies"
      - "github-actions"
      - "metrics-review"
    commit-message:
      prefix: "deps(metrics)"
    open-pull-requests-limit: 3
