name: Profile metrics

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Contribution overview
        uses: lowlighter/metrics@latest
        with:
          user: m1ng-wym
          filename: metrics.overview.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ github.token }}
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories: 200
          repositories_batch: 50
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: no
          plugin_lines: yes
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 8
          plugin_lines_history_limit: 3
          plugin_lines_delay: 30

      - name: Language activity from authored commits
        uses: lowlighter/metrics@latest
        with:
          user: m1ng-wym
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ github.token }}
          base: ""
          repositories: 200
          repositories_batch: 50
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: no
          commits_authoring: m1ng-wym, m1ng-wym@users.noreply.github.com
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 10
          plugin_languages_threshold: 1%
          plugin_languages_other: yes
          plugin_languages_categories: programming, markup, data
          plugin_languages_analysis_timeout: 45
          plugin_languages_analysis_timeout_repositories: 8
