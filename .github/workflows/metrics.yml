name: Profile metrics

on:
  schedule:
    # 02:00, 10:00, and 18:00 Asia/Shanghai.
    - cron: "0 18 * * *"
    - cron: "0 2 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"
      - "assets/useanimations-github.json"
      - "scripts/generate-contribution-metrics.mjs"
      - "scripts/check-language-metrics-contract.mjs"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: profile-metrics-main
  cancel-in-progress: false

jobs:
  github-metrics:
    permissions:
      contents: write
    uses: ./.github/workflows/render-metrics-overview.yml
    with:
      filename: metrics.overview.svg
      output_action: commit
    secrets:
      metrics_token: ${{ secrets.METRICS_TOKEN }}

  contribution-language-metrics:
    runs-on: ubuntu-latest
    needs: github-metrics
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Generate authored contribution language metrics
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          METRICS_USER: m1ng-wym
          METRICS_HIGHLIGHT_REPOS: kkk-an/AgentMe
          METRICS_REPOSITORY_LIMIT: 300
          METRICS_COMMIT_LIMIT_PER_REPO: 2000
        run: node scripts/generate-contribution-metrics.mjs

      - name: Check language metrics contract
        run: node scripts/check-language-metrics-contract.mjs

      - name: Commit generated contribution metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.languages.svg metrics.contributions.json
          if git diff --cached --quiet; then
            echo "No contribution metrics changes"
          else
            git commit -m "Update contribution metrics - [Skip GitHub Action]"
            git push origin main
          fi
