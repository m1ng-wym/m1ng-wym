name: Profile metrics

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"
      - "scripts/generate-contribution-metrics.mjs"
      - "README.md"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Contribution overview
        uses: lowlighter/metrics@latest
        with:
          user: m1ng-wym
          filename: metrics.overview.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ github.token }}
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories: 300
          repositories_batch: 50
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes
          plugin_lines: yes
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 8
          plugin_lines_history_limit: 3
          plugin_lines_delay: 30
          extras_js: |
            document.querySelector(".field.calendar")?.remove()
            document.querySelectorAll(".field").forEach((field) => {
              const text = field.textContent?.replace(/\s+/g, " ").trim() ?? ""
              const isFollowerCount = text.startsWith("Followed by ")
              const isContributedRepositoryCount = text.startsWith("Contributed to ") && text.endsWith(" repositories")
              if (isFollowerCount || isContributedRepositoryCount) {
                field.remove()
              }
            })
            document.querySelectorAll(".row section").forEach((section) => {
              if (!section.textContent?.trim() && !section.querySelector("img, svg, canvas")) {
                section.remove()
              }
            })

  contribution-language-metrics:
    runs-on: ubuntu-latest
    needs: github-metrics
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate authored contribution language metrics
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          METRICS_USER: m1ng-wym
          METRICS_HIGHLIGHT_REPOS: kkk-an/AgentMe
          METRICS_REPOSITORY_LIMIT: 300
          METRICS_COMMIT_LIMIT_PER_REPO: 2000
        run: node scripts/generate-contribution-metrics.mjs

      - name: Commit generated contribution metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.languages.svg metrics.contributions.json
          if git diff --cached --quiet; then
            echo "No contribution metrics changes"
          else
            git commit -m "Update contribution metrics - [Skip GitHub Action]"
            git push origin main
          fi
