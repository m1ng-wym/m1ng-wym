name: Profile assets contract

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/metrics.yml"
      - ".github/workflows/profile-assets-contract.yml"
      - ".github/workflows/render-metrics-overview.yml"
      - ".github/workflows/snake.yml"
      - "README.md"
      - "assets/lucide-terminal-animated.svg"
      - "assets/tiny5-profile-intro.svg"
      - "assets/tiny5-profile-tagline.svg"
      - "assets/tiny5-profile-tagline-mobile.svg"
      - "metrics.contributions.json"
      - "metrics.languages.svg"
      - "scripts/check-language-metrics-contract.mjs"
      - "scripts/check-profile-readme-assets.mjs"
      - "scripts/check-profile-workflows-contract.mjs"
      - "scripts/check-snake-workflow.mjs"
      - "scripts/generate-contribution-metrics.mjs"
  push:
    branches:
      - main
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/metrics.yml"
      - ".github/workflows/profile-assets-contract.yml"
      - ".github/workflows/render-metrics-overview.yml"
      - ".github/workflows/snake.yml"
      - "README.md"
      - "assets/lucide-terminal-animated.svg"
      - "assets/tiny5-profile-intro.svg"
      - "assets/tiny5-profile-tagline.svg"
      - "assets/tiny5-profile-tagline-mobile.svg"
      - "metrics.contributions.json"
      - "metrics.languages.svg"
      - "scripts/check-language-metrics-contract.mjs"
      - "scripts/check-profile-readme-assets.mjs"
      - "scripts/check-profile-workflows-contract.mjs"
      - "scripts/check-snake-workflow.mjs"
      - "scripts/generate-contribution-metrics.mjs"

permissions:
  contents: read

jobs:
  check-profile-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Check profile README assets
        run: node scripts/check-profile-readme-assets.mjs

      - name: Check language metrics contract
        run: node scripts/check-language-metrics-contract.mjs

      - name: Check profile workflow contracts
        run: node scripts/check-profile-workflows-contract.mjs

      - name: Check contribution snake workflow
        run: node scripts/check-snake-workflow.mjs
