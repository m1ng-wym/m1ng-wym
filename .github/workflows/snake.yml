name: Contribution snake

on:
  schedule:
    - cron: "47 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FF5E3A&color_dots=#FFFFFF,#BDE8F5,#4988C4,#153580,#0F2854&color_dot_border=#FFFFFF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add snake backgrounds
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs")

          const source = "dist/github-contribution-grid-snake.svg"
          const mobileTarget = "dist/github-contribution-grid-snake-mobile.svg"
          const expectedViewBox = 'viewBox="-16 -32 880 192"'
          const mobileViewBox = 'viewBox="-16 -4 880 164"'
          const mobileHeight = 'height="164"'
          const desktopBackground = '<rect x="-16" y="-32" width="880" height="192" rx="8" ry="8" fill="#f6f8fa"/>'
          const mobileBackground = '<rect x="-16" y="-4" width="880" height="164" rx="8" ry="8" fill="#f6f8fa"/>'
          const svg = readFileSync(source, "utf8")

          if (!svg.includes(expectedViewBox)) {
            throw new Error(`Unexpected contribution snake viewBox; expected ${expectedViewBox}`)
          }

          if (!svg.includes("</desc>")) {
            throw new Error("Contribution snake SVG is missing the description marker")
          }

          function withBackground(svg, background) {
            return svg.replace("</desc>", `</desc>${background}`)
          }

          const mobileSvg = withBackground(
            svg.replace(expectedViewBox, mobileViewBox).replace('height="192"', mobileHeight),
            mobileBackground,
          )

          writeFileSync(source, withBackground(svg, desktopBackground))
          writeFileSync(mobileTarget, mobileSvg)
          NODE

      - name: Publish contribution snake
        uses: crazy-max/ghaction-github-pages@df5cc2bfa78282ded844b354faee141f06b41865 # v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: Update contribution snake
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
